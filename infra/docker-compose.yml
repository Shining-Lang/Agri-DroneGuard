services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: agri-uav-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agri_uav}
      POSTGRES_USER: ${POSTGRES_USER:-agri_uav}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agri_uav_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agri_uav} -d ${POSTGRES_DB:-agri_uav}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: agri-uav-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
